AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  cloud-resume-challenge

Globals:
  Function:
    Timeout: 30
    LoggingConfig:
      LogFormat: JSON

Resources:

  MyCloudWebsite:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: my-challenge-to-cloud23

  MyOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: my-cloud-resume-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  MyCloudWebsitePolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MyCloudWebsite
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${MyCloudWebsite}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${MyDistribution}"

  MyDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        ViewerCertificate:
          AcmCertificateArn: arn:aws:acm:us-east-1:664418983304:certificate/ff5bcee2-5584-40c1-bfcf-5a1c4380337c
          SslSupportMethod: sni-only
        Aliases:
          - aditya-dev.tech
          - www.aditya-dev.tech
        Origins:
          - DomainName: !GetAtt MyCloudWebsite.RegionalDomainName
            Id: MyS3Origin
            OriginAccessControlId: !GetAtt MyOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: MyS3Origin
          ViewerProtocolPolicy: redirect-to-https
          DefaultTTL: 86400
          MinTTL: 0
          MaxTTL: 31536000
          ForwardedValues:
            QueryString: false

  MyRoute53Record:
    Type: AWS::Route53::RecordSetGroup
    Properties:
      HostedZoneId: Z0752974F77493ZA2N2S
      RecordSets:
        - Name: aditya-dev.tech
          Type: A
          AliasTarget:
            HostedZoneId: Z2FDTNDATAQYW2
            DNSName: !GetAtt MyDistribution.DomainName
        - Name: www.aditya-dev.tech
          Type: A
          AliasTarget:
            HostedZoneId: Z2FDTNDATAQYW2
            DNSName: !GetAtt MyDistribution.DomainName

  VisitorTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: visitorCountTable
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  PutVisitorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: put_visitor/
      Handler: app.lambda_handler
      Runtime: python3.11
      Architectures:
        - x86_64
      Policies:
        - DynamoDBCrudPolicy:
            TableName: visitorCountTable
      Environment:
        Variables:
          TABLE_NAME: visitorCountTable
      Events:
        VisitorCounterUpdate:
          Type: Api
          Properties:
            Path: /visitors
            Method: put
          
  GetVisitorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: get_visitor/
      Handler: app.lambda_handler
      Runtime: python3.11
      Environment:
        Variables:
          TABLE_NAME: visitorCountTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: visitorCountTable
      Events:
        GetVisitorAPI:
          Type: Api
          Properties:
            Path: /visitors
            Method: GET 

  VisitorProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: VisitorProfiles
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: visitor_id
          AttributeType: S
      KeySchema:
        - AttributeName: visitor_id
          KeyType: HASH

  VisitorEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: VisitorEvents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: event_id
          AttributeType: S
        - AttributeName: visitor_id
          AttributeType: S
      KeySchema:
        - AttributeName: event_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: visitor_id_index
          KeySchema:
            - AttributeName: visitor_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  TrackVisitorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/track-visitor/index.handler
      Runtime: nodejs22.x
      MemorySize: 256
      Timeout: 10
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref VisitorProfilesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref VisitorEventsTable
      Environment:
        Variables:
          TABLE_PROFILES: !Ref VisitorProfilesTable
          TABLE_EVENTS: !Ref VisitorEventsTable
      Events:
        TrackAPI:
          Type: HttpApi
          Properties:
            Path: /track
            Method: POST 

Outputs:

  VisitorApi:
    Description: API Gateway endpoint URL for visitor counter
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/visitors"

  WebsiteURL:
    Description: CloudFront distribution URL
    Value: !Sub "https://${MyDistribution.DomainName}"